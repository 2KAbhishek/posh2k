    style = 'diamond'

    [blocks.segments.options]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = 'оӮІ'
    trailing_diamond = '<transparent,#06aad5>оӮІ</>'
    template = 'пі‘ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    foreground = '#000'
    background = '#06aad5'
    type = 'go'
    style = 'diamond'

    [blocks.segments.options]
