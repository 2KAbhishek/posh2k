    foreground = '#000'
    background = '#316ce4'
    type = 'kubectl'
    style = 'diamond'

    [blocks.segments.options]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = 'оӮІ'
    trailing_diamond = '<transparent,#0000aa>оӮІ</>'
    template = 'оҳ  {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    foreground = '#000'
    background = '#0000aa'
    type = 'lua'
    style = 'diamond'

    [blocks.segments.options]
