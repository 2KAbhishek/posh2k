    trailing_diamond = '<transparent,#3c873a>оӮІ</>'
    template = 'оңҳ {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} '
    foreground = '#000'
    background = '#3C873A'
    type = 'node'
    style = 'diamond'

    [blocks.segments.options]
      cache_duration = 'none'
      fetch_package_manager = true
      npm_icon = '<#cc3a3a>оңһ</> '
      yarn_icon = '<#348cba>пҳҡ</> '

  [[blocks.segments]]
    leading_diamond = 'оӮІ'
    trailing_diamond = '<transparent,#6488c0>оӮІ</>'
    template = 'Nx {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    foreground = '#000'
    background = '#6488c0'
    type = 'nx'
    style = 'diamond'

    [blocks.segments.options]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = 'оӮІ'
    trailing_diamond = '<transparent,#41436d>оӮІ</>'
    template = 'оқ© {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    foreground = '#000'
    background = '#41436d'
