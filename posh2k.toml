[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = 'в•°в”Җ'
    foreground = '#21c7a8'
    type = 'text'
    style = 'plain'

    [blocks.segments.options]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮ°'
    template = '{{ if gt .Code 0 }}пҖҚ[{{ .Code }}]{{ else }}п„ө пҒ”{{ end }}'
    foreground = '#000'
    background = '#21c7a8'
    type = 'exit'
    style = 'diamond'
    foreground_templates = ['{{ if gt .Code 0 }}#c10e39{{ end }}']

    [blocks.segments.options]
      always_enabled = true
      cache_duration = 'none'
