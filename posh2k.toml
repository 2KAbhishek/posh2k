console_title_template = '{{ .Folder }}'
version = 3
final_space = true

[transient_prompt]
  template = 'оҠ… '
  foreground = '#1688f0'
  background = 'transparent'

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = 'в•ӯв”ҖоӮ¶'
    trailing_diamond = 'оӮ°'
    template = ' {{ if .WSL }}WSL @ {{ end }}{{.Icon}}  '
    foreground = '#000'
    background = '#21c7a8'
    type = 'os'
    style = 'diamond'

    [blocks.segments.options]
      cache_duration = 'none'

  [[blocks.segments]]
    template = 'пҠ’ '
    foreground = '#000'
    powerline_symbol = 'оӮ°'
    background = '#ef53d0'
    type = 'root'
    style = 'powerline'

    [blocks.segments.options]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = '<transparent,#1688f0>оӮ°</>'
    trailing_diamond = '<#1688f0,transparent>оӮ°</>'
    template = '{{ path .Path .Location }}'
    foreground = '#000'
    powerline_symbol = 'оӮ°'
    background = '#1688f0'
    type = 'path'
    style = 'diamond'

    [blocks.segments.options]
      cache_duration = 'none'
      folder_icon = 'пҒ» '
      folder_separator_icon = '/'
      home_icon = 'пҖ• ~'
      style = 'unique'

  [[blocks.segments]]
    template = ' {{ url .UpstreamIcon .UpstreamURL }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} пҒ„ {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} пҒҶ {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} пҡ’ {{ .StashCount }}{{ end }} '
    foreground = '#000'
    powerline_symbol = 'оӮ°'
    background = '#20ff40'
    type = 'git'
    style = 'powerline'
    background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}#ffcf0a{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff6c6c{{ end }}', '{{ if gt .Ahead 0 }}#18c230{{ end }}', '{{ if gt .Behind 0 }}#58d369{{ end }}']

    [blocks.segments.options]
      branch_ahead_icon = 'пӮӘ '
      branch_behind_icon = 'пӮ« '
      branch_icon = 'оңҘ '
      branch_max_length = 64.0
      cache_duration = 'none'
      fetch_stash_count = true
      fetch_status = true
      fetch_upstream_icon = true
      fetch_worktree_count = true
      truncate_symbol = 'п…Ғ'

  [[blocks.segments]]
    leading_diamond = '<transparent,#26c6ee>оӮ°</>'
    trailing_diamond = 'оӮ°'
    template = 'пҖ— {{ .CurrentDate | date .Format }}'
    foreground = '#000'
    background = '#26c6ee'
    type = 'time'
    style = 'diamond'

    [blocks.segments.options]
      cache_duration = 'none'
      time_format = 'Mon, 03:04 PM '

  [[blocks.segments]]
    leading_diamond = '<transparent,#f4356f>оӮ°</>'
    trailing_diamond = 'оӮҙ'
    template = 'пү“ {{ .FormattedMs }}'
    foreground = '#000'
    background = '#f4356f'
    type = 'executiontime'
    style = 'diamond'

    [blocks.segments.options]
      cache_duration = 'none'
      style = 'roundrock'
      threshold = 10.0

[[blocks]]
  type = 'prompt'
  alignment = 'right'
  overflow = 'break'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = '<transparent,#d6deeb>оӮІ</>'
    template = '{{ .Name }}'
    foreground = '#000'
    background = '#d6deeb'
    type = 'shell'
    style = 'diamond'

    [blocks.segments.options]
      cache_duration = 'none'

      [blocks.segments.options.mapped_shell_names]
        bash = 'оҜҠ bash'
        cmd = 'оҳ© cmd'
        fish = 'пң№ fish'
        pwsh = 'оҜҮ pwsh'
        zsh = 'пғ§ zsh'

  [[blocks.segments]]
    leading_diamond = 'оӮІ'
    trailing_diamond = '<transparent,#ce092f>оӮІ</>'
    template = 'оқ“ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    foreground = '#000'
    background = '#ce092f'
    type = 'angular'
    style = 'diamond'

    [blocks.segments.options]
