    template = '<#ca3c34>оҳӨ</> {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    foreground = '#000'
    background = '#945bb3'
    type = 'julia'
    style = 'diamond'

    [blocks.segments.options]
